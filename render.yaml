services:
  - type: web
    name: hms-api
    env: python
    rootDir: server
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run gunicorn -w 2 -b 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/auth/me
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_COOKIE_SECURE
        value: "1"
      - key: JWT_COOKIE_SAMESITE
        value: None
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: EMAIL_MODE
        value: log

  - type: worker
    name: hms-worker
    env: python
    rootDir: server
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run celery -A worker.celery worker -l info -B
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        fromService:
          name: hms-api
          type: web
          envVarKey: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          name: hms-api
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: JWT_COOKIE_SECURE
        value: "1"
      - key: JWT_COOKIE_SAMESITE
        value: None
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: EMAIL_MODE
        value: log

databases:
  - name: hms-db
    plan: free
